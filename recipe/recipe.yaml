schema_version: 1

context:
  name: foundry_ml
  version: 1.2.2

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/foundry_ml-${{ version }}.tar.gz
  sha256: cbb8f26c70cd17b17fbb78f4eecf55ee3ea543ab658934b6f120b57ca0ef4c36

build:
  number: 1
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - mdf_toolbox >=0.7.1
    - requests >=2.31.0
    - rich >=13.7.0
    - tqdm >=4.66.0
    - typer >=0.12.0
    - openpyxl >=3.1.0
    - python >=${{ python_min }}
    - mdf_forge >=0.8.0
    - globus-sdk >=3,<4
    - dlhub-sdk >=1.0.0
    - numpy >=2.0.0
    - pandas >=2.2.2
    - pydantic >=2.7.2
    - mdf-connect-client >=0.5.0
    - h5py >=3.11.0
    - json2table >=1.1.5

tests:
  - python:
      imports:
        - foundry
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - pip check

about:
  summary: Package to support simplified application of machine learning models to datasets in materials science
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/MLMI2-CSSI/foundry

extra:
  recipe-maintainers:
    - WardLT
    - jan-janssen
