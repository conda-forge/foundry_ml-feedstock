{% set name = "foundry_ml" %}
{% set version = "1.2.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/foundry_ml-{{ version }}.tar.gz
  sha256: 6f90f6c2cc91a07f6b793a91b0cd5a886ff2ba060fcda08f7655e39d6a57069a

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - mdf_connect_client >=0.5.0
    - mdf_toolbox >=0.7.1
    - requests >=2.31.0
    - rich >=13.7.0
    - tqdm >=4.66.0
    - typer >=0.12.0
    - openpyxl >=3.1.0
    - python >={{ python_min }}
    - mdf_forge >=0.8.0
    - globus-sdk >=3,<4
    - dlhub-sdk >=1.0.0
    - numpy >=2.0.0
    - pandas >=2.2.2
    - pydantic >=2.7.2
    - mdf-connect-client >=0.5.0
    - h5py >=3.11.0
    - json2table >=1.1.5

test:
  imports:
    - foundry
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/MLMI2-CSSI/foundry
  summary: Package to support simplified application of machine learning models to datasets in materials science
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - WardLT
    - jan-janssen
