{% set name = "foundry_ml" %}
{% set version = "1.2.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/foundry_ml-{{ version }}.tar.gz
  sha256: 5aa4d2cc9e79df0f9612870cad48439aa9b4753ddbff6d7ddd13058bf798807b

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - dlhub_sdk >=1.0.0
    - mdf_connect_client >=0.5.0
    - mdf_toolbox >=0.6.0
    - rich >=13.0.0
    - typer >=0.9.0
    - openpyxl >=3.1.0
    - python >={{ python_min }}
    - mdf_forge >=0.8.0
    - globus-sdk >=3,<4
    - dlhub-sdk >=1.0.0
    - numpy >=1.15.4
    - pandas >=0.23.4
    - pydantic >=2.7.2
    - mdf-connect-client >=0.5.0
    - h5py >=2.10.0
    - json2table

test:
  imports:
    - foundry
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/MLMI2-CSSI/foundry
  summary: Package to support simplified application of machine learning models to datasets in materials science
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - WardLT
    - jan-janssen
